<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Lost & Found</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1>Lost & Found</h1>
        <p>Find your lost items or report found ones</p>
    </header>

    <div class="controls">
        <input type="text" id="searchBar" placeholder="Search items...">

        <select id="filter">
            <option value="all">All</option>
            <option value="lost">Lost</option>
            <option value="found">Found</option>
        </select>
    </div>

    <div class="container" id="itemsContainer"></div>

    <!-- Modal -->
    <div id="itemModal" class="modal hidden">
        <div class="modal-content">
            <span id="closeModal">&times;</span>
            <img id="modalImage" src="" alt="">
            <h2 id="modalTitle"></h2>
            <p id="modalDescription"></p>
            <button id="claimBtn">Claim Item</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
